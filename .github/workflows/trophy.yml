name: Update Trophies

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - run: python scripts/generate_trophy.py

      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add trophy.svg
          git commit -m "Update trophies" || exit 0
          git push
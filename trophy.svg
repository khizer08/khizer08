
<svg width="1200" height="320" xmlns="http://www.w3.org/2000/svg">

<style>
.bg {
    fill:#1a1b26;
}

.outer {
    fill:none;
    stroke:#bb9af7;
    stroke-width:2;
}

.card {
    fill:#24283b;
    stroke:#565f89;
    stroke-width:2;
}

.title {
    fill:#7aa2f7;
    font-size:34px;
    font-family:Arial;
    font-weight:bold;
}

.value {
    fill:#bb9af7;
    font-size:40px;
    font-family:Arial;
    font-weight:bold;
}

.label {
    fill:#73daca;
    font-size:18px;
    font-family:Arial;
}

.rank {
    fill:#fbbf24;
    font-size:24px;
    font-family:Arial;
    font-weight:bold;
}
</style>

<!-- Background -->
<rect width="1200" height="320" class="bg"/>

<!-- Outer Border -->
<rect x="10" y="10"
      width="1180"
      height="300"
      rx="20"
      class="outer"/>

<!-- Title -->
<line x1="170" y1="50"
      x2="350" y2="50"
      stroke="#bb9af7"
      stroke-width="2"/>

<line x1="850" y1="50"
      x2="1030" y2="50"
      stroke="#bb9af7"
      stroke-width="2"/>

<text x="600"
      y="58"
      text-anchor="middle"
      class="title">
GitHub Achievements
</text>

<!-- Stars -->
<rect x="30" y="90" width="170" height="180" rx="15" class="card"/>
<text x="115" y="130" text-anchor="middle" class="rank">★</text>
<text x="115" y="195" text-anchor="middle" class="value">1</text>
<text x="115" y="235" text-anchor="middle" class="label">Stars</text>

<!-- Repositories -->
<rect x="220" y="90" width="170" height="180" rx="15" class="card"/>
<text x="305" y="130" text-anchor="middle" class="rank">★</text>
<text x="305" y="195" text-anchor="middle" class="value">23</text>
<text x="305" y="235" text-anchor="middle" class="label">Repositories</text>

<!-- Followers -->
<rect x="410" y="90" width="170" height="180" rx="15" class="card"/>
<text x="495" y="130" text-anchor="middle" class="rank">★</text>
<text x="495" y="195" text-anchor="middle" class="value">9</text>
<text x="495" y="235" text-anchor="middle" class="label">Followers</text>

<!-- Streak -->
<rect x="600" y="90" width="170" height="180" rx="15" class="card"/>
<text x="685" y="130" text-anchor="middle" class="rank">★★</text>
<text x="685" y="195" text-anchor="middle" class="value">108</text>
<text x="685" y="235" text-anchor="middle" class="label">Streak</text>

<!-- Contributions -->
<rect x="790" y="90" width="170" height="180" rx="15" class="card"/>
<text x="875" y="130" text-anchor="middle" class="rank">★★</text>
<text x="875" y="195" text-anchor="middle" class="value">1027</text>
<text x="875" y="235" text-anchor="middle" class="label">Contributions</text>

<!-- Active Days -->
<rect x="980" y="90" width="170" height="180" rx="15" class="card"/>
<text x="1065" y="130" text-anchor="middle" class="rank">★★</text>
<text x="1065" y="195" text-anchor="middle" class="value">243</text>
<text x="1065" y="235" text-anchor="middle" class="label">Active Days</text>

</svg>
